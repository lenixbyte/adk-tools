    <rect x="48" y="80" width="220" height="22" fill="#252526"/>
    <polygon points="64,86 67,91 64,96 61,91" fill="#4ec9b0"/>
    <text x="74" y="96" fill="#4ec9b0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">gemini-2.0-flash</text>

    <!-- Development -->
    <rect x="48" y="104" width="220" height="22" fill="#252526"/>
    <text x="57" y="119" fill="#858585" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">▾</text>
    <text x="70" y="119" fill="#cccccc" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">Development</text>

