    <line x1="48" y1="58" x2="268" y2="58" stroke="#3d3d3d" stroke-width="1"/>

    <!-- Project -->
    <rect x="48" y="58" width="220" height="22" fill="#252526"/>
    <rect x="58" y="67" width="13" height="9" rx="1" fill="#e2a950"/>
    <rect x="58" y="65" width="6" height="4" rx="1" fill="#e2a950"/>
    <text x="76" y="78" fill="#cccccc" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">my_agent</text>
    <text x="168" y="78" fill="#858585" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">python · uv</text>

