    <text x="57" y="223" fill="#858585" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10">▸</text>
    <text x="70" y="223" fill="#cccccc" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">Deployment</text>

    <!-- Evaluation -->
