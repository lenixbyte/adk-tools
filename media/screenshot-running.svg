<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420">
  <defs>
    <filter id="run-shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000" flood-opacity="0.55"/>
