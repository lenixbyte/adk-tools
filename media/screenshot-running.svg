    <text x="300" y="230" fill="#555555" font-family="'SF Mono',Menlo,monospace" font-size="13" text-anchor="end">8</text>
    <text x="300" y="250" fill="#555555" font-family="'SF Mono',Menlo,monospace" font-size="13" text-anchor="end">9</text>
    <text x="300" y="270" fill="#555555" font-family="'SF Mono',Menlo,monospace" font-size="13" text-anchor="end">10</text>
    <text x="300" y="290" fill="#555555" font-family="'SF Mono',Menlo,monospace" font-size="13" text-anchor="end">11</text>
    <text x="300" y="310" fill="#555555" font-family="'SF Mono',Menlo,monospace" font-size="13" text-anchor="end">12</text>
    <text x="300" y="330" fill="#555555" font-family="'SF Mono',Menlo,monospace" font-size="13" text-anchor="end">13</text>

    <!-- Code -->
    <text x="316" y="90" fill="#c586c0" font-family="'SF Mono',Menlo,monospace" font-size="13">from</text>
    <text x="354" y="90" fill="#cccccc" font-family="'SF Mono',Menlo,monospace" font-size="13"> google.adk.agents </text>
    <text x="512" y="90" fill="#c586c0" font-family="'SF Mono',Menlo,monospace" font-size="13">import</text>
    <text x="556" y="90" fill="#4ec9b0" font-family="'SF Mono',Menlo,monospace" font-size="13"> LlmAgent</text>

    <text x="316" y="130" fill="#6a9955" font-family="'SF Mono',Menlo,monospace" font-size="13">def greet(name: str) -&gt; str:</text>
    <text x="316" y="150" fill="#6a9955" font-family="'SF Mono',Menlo,monospace" font-size="13">    """Greet a user by name."""</text>
    <text x="316" y="170" fill="#c586c0" font-family="'SF Mono',Menlo,monospace" font-size="13">    return</text>
    <text x="370" y="170" fill="#ce9178" font-family="'SF Mono',Menlo,monospace" font-size="13"> f'Hello, {"{"}name{"}"}!'</text>

    <text x="316" y="210" fill="#9cdcfe" font-family="'SF Mono',Menlo,monospace" font-size="13">root_agent</text>
    <text x="410" y="210" fill="#cccccc" font-family="'SF Mono',Menlo,monospace" font-size="13"> = </text>
    <text x="432" y="210" fill="#4ec9b0" font-family="'SF Mono',Menlo,monospace" font-size="13">LlmAgent</text>
    <text x="510" y="210" fill="#cccccc" font-family="'SF Mono',Menlo,monospace" font-size="13">(</text>
    <text x="336" y="230" fill="#9cdcfe" font-family="'SF Mono',Menlo,monospace" font-size="13">name</text>
    <text x="376" y="230" fill="#cccccc" font-family="'SF Mono',Menlo,monospace" font-size="13">=</text>
    <text x="390" y="230" fill="#ce9178" font-family="'SF Mono',Menlo,monospace" font-size="13">'my_agent'</text>
    <text x="336" y="250" fill="#9cdcfe" font-family="'SF Mono',Menlo,monospace" font-size="13">model</text>
    <text x="384" y="250" fill="#cccccc" font-family="'SF Mono',Menlo,monospace" font-size="13">=</text>
    <text x="398" y="250" fill="#ce9178" font-family="'SF Mono',Menlo,monospace" font-size="13">'gemini-2.0-flash'</text>
    <text x="336" y="270" fill="#9cdcfe" font-family="'SF Mono',Menlo,monospace" font-size="13">instruction</text>
    <text x="430" y="270" fill="#cccccc" font-family="'SF Mono',Menlo,monospace" font-size="13">=</text>
    <text x="316" y="290" fill="#ce9178" font-family="'SF Mono',Menlo,monospace" font-size="13">    'You are a helpful assistant.'</text>
    <text x="336" y="310" fill="#9cdcfe" font-family="'SF Mono',Menlo,monospace" font-size="13">tools</text>
    <text x="375" y="310" fill="#cccccc" font-family="'SF Mono',Menlo,monospace" font-size="13">=[greet],</text>
    <text x="316" y="330" fill="#cccccc" font-family="'SF Mono',Menlo,monospace" font-size="13">)</text>

