<svg xmlns="http://www.w3.org/2000/svg" width="620" height="300">
  <defs>
    <filter id="inst-shadow" x="-5%" y="-6%" width="110%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <clipPath id="inst-clip">
      <rect width="620" height="300" rx="10"/>
    </clipPath>
  </defs>

  <g filter="url(#inst-shadow)">
    <rect x="8" y="8" width="604" height="284" rx="10" fill="#1e1e1e"/>
  </g>

  <g clip-path="url(#inst-clip)" transform="translate(8,8)">
    <!-- Editor background -->
    <rect width="604" height="284" fill="#1e1e1e"/>
    <!-- Dimmed code lines -->
    <text x="20" y="30" fill="#2d2d2d" font-family="'SF Mono',Menlo,monospace" font-size="12">from google.adk.agents import LlmAgent</text>
    <text x="20" y="50" fill="#2d2d2d" font-family="'SF Mono',Menlo,monospace" font-size="12">root_agent = LlmAgent(</text>
    <text x="20" y="70" fill="#2d2d2d" font-family="'SF Mono',Menlo,monospace" font-size="12">    model='gemini-2.0-flash',</text>

    <!-- QuickPick -->
    <rect x="102" y="20" width="400" height="236" rx="6" fill="#3c3c3c"/>
    <rect x="102" y="20" width="400" height="236" rx="6" fill="none" stroke="#454545" stroke-width="1"/>

    <!-- Title -->
    <text x="122" y="40" fill="#b0b0b0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">ADK CLI not found — Install google-adk</text>

    <!-- Search box -->
    <rect x="112" y="48" width="380" height="30" rx="4" fill="#3c3c3c" stroke="#007fd4" stroke-width="1.5"/>
    <text x="126" y="68" fill="#858585" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13">Choose how to install ADK</text>

    <line x1="112" y1="82" x2="492" y2="82" stroke="#454545" stroke-width="0.5"/>

    <!-- Option 1 — uv (highlighted) -->
    <rect x="112" y="83" width="380" height="44" rx="4" fill="#04395e"/>
    <text x="115" y="102" fill="#007acc" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13">›</text>
    <text x="128" y="102" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="500">Install with uv  (recommended)</text>
    <text x="128" y="120" fill="#7cb4e0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">uv tool install google-adk · Fast — uv detected in your environment</text>

    <!-- Option 2 — pip -->
    <rect x="112" y="127" width="380" height="44" fill="#3c3c3c"/>
    <text x="128" y="146" fill="#cccccc" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13">Install with pip</text>
    <text x="128" y="164" fill="#858585" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">python3 -m pip install google-adk · Installs globally into system Python</text>

    <!-- Option 3 — venv -->
    <rect x="112" y="171" width="380" height="44" fill="#3c3c3c"/>
    <text x="128" y="190" fill="#cccccc" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13">Create .venv and install  (isolated)</text>
    <text x="128" y="208" fill="#858585" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">python -m venv .venv &amp;&amp; pip install · Keeps projects self-contained</text>

    <!-- Option 4 — docs -->
    <rect x="112" y="215" width="380" height="34" rx="6" fill="#3c3c3c"/>
    <rect x="112" y="215" width="380" height="10" fill="#3c3c3c"/>
    <line x1="112" y1="215" x2="492" y2="215" stroke="#454545" stroke-width="0.5"/>
    <text x="128" y="237" fill="#cccccc" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13">Open install docs</text>
    <text x="262" y="237" fill="#858585" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">adk.dev/get-started/installation</text>

    <!-- Status bar -->
    <rect y="262" width="604" height="22" fill="#007acc"/>
    <text x="10" y="278" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">⚡ ADK</text>
  </g>
</svg>
