<svg xmlns="http://www.w3.org/2000/svg" width="780" height="460">
  <defs>
    <filter id="graph-shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <clipPath id="graph-clip">
      <rect width="780" height="460" rx="10"/>
    </clipPath>
    <!-- Card shadow -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <!-- Root card glow -->
    <filter id="root-glow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#007acc" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g filter="url(#graph-shadow)">
    <rect x="8" y="6" width="764" height="448" rx="10" fill="#1e1e1e"/>
  </g>

  <g clip-path="url(#graph-clip)" transform="translate(8,6)">
    <!-- Title bar -->
    <rect width="764" height="30" fill="#323232"/>
    <circle cx="20" cy="15" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="15" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="15" r="6" fill="#27c93f"/>
    <text x="382" y="20" fill="#ababab" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" text-anchor="middle">Agent Graph — ADK Tools</text>

    <!-- Toolbar (y=30, h=44) -->
    <rect y="30" width="764" height="44" fill="#252526"/>
    <line x1="0" y1="74" x2="764" y2="74" stroke="#3a3a3a" stroke-width="1"/>

    <!-- Agent picker button -->
    <rect x="12" y="39" width="230" height="26" rx="5" fill="#2d2d2d" stroke="#505050" stroke-width="1"/>
    <text x="22" y="56" fill="#cccccc" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">⬡  support_orchestrator</text>
    <text x="226" y="56" fill="#858585" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11"> ▾</text>

    <!-- Switch button -->
    <rect x="250" y="39" width="64" height="26" rx="5" fill="#0e639c" stroke="#1177bb" stroke-width="1"/>
    <text x="282" y="56" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" text-anchor="middle">Switch</text>

    <!-- Server status -->
    <circle cx="490" cy="52" r="5" fill="#4daa4d"/>
    <text x="500" y="56" fill="#4daa4d" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">Server running  :8000</text>

    <!-- Fit button -->
    <rect x="668" y="39" width="48" height="26" rx="5" fill="#2d2d2d" stroke="#505050" stroke-width="1"/>
    <text x="692" y="56" fill="#cccccc" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" text-anchor="middle">Fit</text>

    <!-- Zoom controls -->
    <rect x="720" y="39" width="26" height="26" rx="4" fill="#2d2d2d" stroke="#505050" stroke-width="1"/>
    <text x="733" y="56" fill="#cccccc" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="16" text-anchor="middle" font-weight="300">+</text>
    <rect x="748" y="39" width="26" height="26" rx="4" fill="#2d2d2d" stroke="#505050" stroke-width="1"/>
    <text x="761" y="56" fill="#cccccc" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="16" text-anchor="middle" font-weight="300">−</text>

    <!-- Graph canvas (y=74) -->
    <rect y="74" width="764" height="352" fill="#181818"/>

    <!-- Subtle grid dots -->
    <pattern id="dot-grid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="#2a2a2a"/>
    </pattern>
    <rect y="74" width="764" height="352" fill="url(#dot-grid)"/>

    <!-- ─── Edges ─── -->
    <!-- Root → billing_agent -->
    <path d="M 282 196 C 282 220 104 220 104 242" stroke="#404060" stroke-width="1.8" fill="none" stroke-dasharray="0"/>
    <polygon points="104,242 100,234 108,234" fill="#404060"/>

    <!-- Root → tech_support -->
    <path d="M 340 196 C 340 218 292 218 292 242" stroke="#404060" stroke-width="1.8" fill="none"/>
    <polygon points="292,242 288,234 296,234" fill="#404060"/>

    <!-- Root → knowledge_base -->
    <path d="M 424 196 C 424 218 480 218 480 242" stroke="#404060" stroke-width="1.8" fill="none"/>
    <polygon points="480,242 476,234 484,234" fill="#404060"/>

    <!-- Root → escalation_agent -->
    <path d="M 472 196 C 472 218 668 218 668 242" stroke="#404060" stroke-width="1.8" fill="none"/>
    <polygon points="668,242 664,234 672,234" fill="#404060"/>

    <!-- ─── Root card: support_orchestrator ─── -->
    <g filter="url(#root-glow)">
      <rect x="282" y="106" width="220" height="90" rx="10" fill="#0e2236" stroke="#007acc" stroke-width="2"/>
    </g>
    <!-- Root card type label -->
    <text x="392" y="128" fill="#569cd6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" text-anchor="middle" letter-spacing="0.6">LlmAgent</text>
    <!-- Root card name -->
    <text x="392" y="150" fill="#e8e8e8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="600" text-anchor="middle">support_orchestrator</text>
    <!-- Model badge -->
    <rect x="320" y="158" width="144" height="18" rx="9" fill="#0d3040"/>
    <text x="392" y="171" fill="#4ec9b0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" text-anchor="middle">gemini-2.5-flash</text>

    <!-- ─── Sub-agent cards ─── -->

    <!-- billing_agent (x=16, width=170, center=101) -->
    <g filter="url(#card-shadow)">
      <rect x="16" y="242" width="170" height="72" rx="8" fill="#1e2130" stroke="#3a3a5c" stroke-width="1.5"/>
    </g>
    <text x="101" y="261" fill="#9cdcfe" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" text-anchor="middle" letter-spacing="0.5">LlmAgent</text>
    <text x="101" y="279" fill="#cccccc" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" text-anchor="middle">billing_agent</text>
    <!-- Tool chips -->
    <rect x="20" y="288" width="88" height="18" rx="9" fill="#0d2a2a" stroke="#1c5068" stroke-width="1"/>
    <text x="64" y="300" fill="#4ec9b0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" text-anchor="middle">check_payment</text>
    <rect x="114" y="288" width="68" height="18" rx="9" fill="#0d2a2a" stroke="#1c5068" stroke-width="1"/>
    <text x="148" y="300" fill="#4ec9b0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" text-anchor="middle">refund</text>

    <!-- tech_support (x=210, width=160, center=290) -->
    <g filter="url(#card-shadow)">
      <rect x="210" y="242" width="160" height="72" rx="8" fill="#1e2130" stroke="#3a3a5c" stroke-width="1.5"/>
    </g>
    <text x="290" y="261" fill="#9cdcfe" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" text-anchor="middle" letter-spacing="0.5">LlmAgent</text>
    <text x="290" y="279" fill="#cccccc" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" text-anchor="middle">tech_support</text>
    <!-- Tool chip -->
    <rect x="218" y="288" width="88" height="18" rx="9" fill="#0d2a2a" stroke="#1c5068" stroke-width="1"/>
    <text x="262" y="300" fill="#4ec9b0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" text-anchor="middle">diagnose_issue</text>

    <!-- knowledge_base (x=398, width=164, center=480) -->
    <g filter="url(#card-shadow)">
      <rect x="398" y="242" width="164" height="72" rx="8" fill="#1e2130" stroke="#3a3a5c" stroke-width="1.5"/>
    </g>
    <text x="480" y="261" fill="#9cdcfe" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" text-anchor="middle" letter-spacing="0.5">LlmAgent</text>
    <text x="480" y="279" fill="#cccccc" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" text-anchor="middle">knowledge_base</text>
    <!-- Tool chips -->
    <rect x="402" y="288" width="74" height="18" rx="9" fill="#0d2a2a" stroke="#1c5068" stroke-width="1"/>
    <text x="439" y="300" fill="#4ec9b0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" text-anchor="middle">search_docs</text>
    <rect x="482" y="288" width="76" height="18" rx="9" fill="#0d2a2a" stroke="#1c5068" stroke-width="1"/>
    <text x="520" y="300" fill="#4ec9b0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" text-anchor="middle">lookup_ticket</text>

    <!-- escalation_agent (x=586, width=162, center=667) -->
    <g filter="url(#card-shadow)">
      <rect x="586" y="242" width="162" height="72" rx="8" fill="#1e2130" stroke="#3a3a5c" stroke-width="1.5"/>
    </g>
    <text x="667" y="261" fill="#9cdcfe" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" text-anchor="middle" letter-spacing="0.5">LlmAgent</text>
    <text x="667" y="279" fill="#cccccc" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" text-anchor="middle">escalation_agent</text>
    <!-- Tool chip -->
    <rect x="594" y="288" width="82" height="18" rx="9" fill="#0d2a2a" stroke="#1c5068" stroke-width="1"/>
    <text x="635" y="300" fill="#4ec9b0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" text-anchor="middle">escalate_case</text>

    <!-- Canvas hint: click to jump to source -->
    <text x="382" y="414" fill="#404040" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" text-anchor="middle">Click any card to jump to source  ·  Scroll to zoom  ·  Drag to pan</text>

    <!-- Status bar -->
    <rect y="426" width="764" height="22" fill="#cc6633"/>
    <text x="10" y="442" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="500">⚡ ADK · uv</text>
    <rect x="108" y="428" width="76" height="16" rx="3" fill="#b35520"/>
    <text x="146" y="440" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" text-anchor="middle">📡 :8000</text>
    <rect x="188" y="428" width="62" height="16" rx="3" fill="#b35520"/>
    <text x="219" y="440" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" text-anchor="middle">■ Stop</text>
  </g>
</svg>
