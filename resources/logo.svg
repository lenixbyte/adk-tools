<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B9BF8"/>
      <stop offset="55%" stop-color="#3B78E7"/>
      <stop offset="100%" stop-color="#1A56C4"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D8E8FF" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0D2F7A" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle grid pattern for "agent" feel -->
  <g opacity="0.08" stroke="white" stroke-width="1.2">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Corner dots (agent/neural feel) -->
  <circle cx="128" cy="128" r="5" fill="white" opacity="0.18"/>
  <circle cx="256" cy="128" r="5" fill="white" opacity="0.18"/>
  <circle cx="384" cy="128" r="5" fill="white" opacity="0.18"/>
  <circle cx="128" cy="256" r="5" fill="white" opacity="0.18"/>
  <circle cx="384" cy="256" r="5" fill="white" opacity="0.18"/>
  <circle cx="128" cy="384" r="5" fill="white" opacity="0.18"/>
  <circle cx="256" cy="384" r="5" fill="white" opacity="0.18"/>
  <circle cx="384" cy="384" r="5" fill="white" opacity="0.18"/>

  <!-- Lightning bolt — centered, bold, white -->
  <path
    d="M 296 64 L 158 282 L 248 282 L 216 448 L 354 230 L 264 230 Z"
    fill="url(#bolt)"
    filter="url(#glow)"
  />
</svg>
